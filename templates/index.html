<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Python Network Scanner</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #1c92d2, #f2fcfe); /* gradient background */
            color: #333;
            text-align: center;
            padding: 50px;
        }

        h1 {
            color: #0b3d91;
        }

        form {
            margin-bottom: 30px;
        }

        input[type="text"] {
            padding: 10px;
            width: 250px;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-size: 16px;
        }

        button {
            padding: 10px 20px;
            border-radius: 5px;
            border: none;
            background-color: #0b3d91;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #054a91;
        }

        hr {
            margin: 40px 0;
            border: 1px solid #ccc;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            margin: 5px 0;
            font-weight: bold;
        }

        .open {
            color: green;
        }

        .error {
            color: red;
        }

        .results-box {
            background: rgba(255, 255, 255, 0.8);
            padding: 20px;
            border-radius: 10px;
            display: inline-block;
            text-align: left;
        }
    </style>
</head>
<body>
    <h1>Network Scanner</h1>

    <form method="POST">
        <input type="text" name="ip" placeholder="Enter IP or hostname" required>
        <button type="submit">Scan</button>
    </form>

    <hr>

    {% if results %}
    <div class="results-box">
        <h2>Scan Results for {{ request.form.ip }}{% if resolved_ip %} ({{ resolved_ip }}){% endif %}:</h2>
        <ul>
            {% for result in results %}
                {% if "→ OPEN" in result %}
                    <li class="open">{{ result }}</li>
                {% else %}
                    <li class="error">{{ result }}</li>
                {% endif %}
            {% endfor %}
        </ul>
    </div>
    {% endif %}
</body>
</html>
